<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SparkGraph — 灵感星图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#07070f;--bg-surface:#0d0e1f;--bg-elevated:#151730;
  --bg-glass:rgba(13,14,31,0.88);--bg-glass-hover:rgba(21,23,48,0.92);
  --text-primary:#f1f3fb;--text-secondary:#b0b6d4;--text-muted:#7078a0;
  --spark:#f5b83a;--spark-light:#fcd97e;--spark-glow:rgba(245,184,58,0.35);
  --shared:#c4a06a;--shared-light:#ddc49a;--shared-glow:rgba(196,160,106,0.25);
  --theme:#38bdf8;--theme-light:#7dd3fc;--theme-glow:rgba(56,189,248,0.30);
  --accent:#fb7185;--accent-glow:rgba(251,113,133,0.30);
  --border:rgba(255,255,255,0.08);--border-active:rgba(255,255,255,0.18);
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --sidebar-w:320px;
  --font-display:'Instrument Serif',Georgia,serif;
  --font-body:'Sora',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;font-family:var(--font-body);background:var(--bg-deep);color:var(--text-primary)}
body{
  background-image:
    radial-gradient(ellipse at 15% 50%,rgba(56,189,248,0.025) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 20%,rgba(245,184,58,0.025) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 85%,rgba(251,113,133,0.018) 0%,transparent 50%);
}
.app{display:flex;height:100vh;position:relative}

/* ── Sidebar ── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;
  background:var(--bg-surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:20;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .3s;
}
.sidebar.collapsed{transform:translateX(calc(var(--sidebar-w) * -1));opacity:0;position:absolute;pointer-events:none}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:var(--font-display);font-size:26px;letter-spacing:-0.02em;display:flex;align-items:center;gap:10px}
.logo-spark{color:var(--spark);font-size:20px}
.sidebar-stats{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);margin-top:6px;letter-spacing:0.03em}
.sidebar-search{padding:12px 20px;flex-shrink:0}
.search-input{
  width:100%;padding:10px 14px 10px 36px;background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;font-family:var(--font-body);
  outline:none;transition:border-color .2s;
}
.search-input:focus{border-color:var(--border-active)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none}

.source-filter{padding:4px 20px 8px;display:flex;gap:4px;flex-shrink:0}
.source-btn{
  flex:1;padding:6px 8px;font-size:11px;font-family:var(--font-body);font-weight:500;
  border-radius:var(--radius-xs);cursor:pointer;text-align:center;
  background:transparent;border:1px solid transparent;color:var(--text-muted);transition:all .2s;
}
.source-btn:hover{color:var(--text-secondary)}
.source-btn.active{background:var(--bg-elevated);border-color:var(--border);color:var(--text-primary)}
.source-count{opacity:.5;margin-left:2px;font-size:10px}

.tag-filters{padding:4px 20px 12px;display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0}
.tag-chip{
  padding:4px 10px;font-size:11px;border-radius:20px;cursor:pointer;
  background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);
  transition:all .2s;font-family:var(--font-body);white-space:nowrap;
}
.tag-chip:hover{border-color:var(--theme);color:var(--theme)}
.tag-chip.active{background:rgba(56,189,248,0.12);border-color:var(--theme);color:var(--theme-light)}

.spark-list{flex:1;overflow-y:auto;padding:8px 12px;scrollbar-width:thin;scrollbar-color:var(--bg-elevated) transparent}
.spark-list::-webkit-scrollbar{width:4px}
.spark-list::-webkit-scrollbar-track{background:transparent}
.spark-list::-webkit-scrollbar-thumb{background:var(--bg-elevated);border-radius:4px}
.spark-item{
  padding:14px;border-radius:var(--radius-sm);cursor:pointer;
  transition:background .2s;margin-bottom:4px;border:1px solid transparent;
}
.spark-item:hover{background:var(--bg-elevated);border-color:var(--border)}
.spark-item.active{background:rgba(245,184,58,0.06);border-color:rgba(245,184,58,0.15)}
.spark-item-content{font-size:13px;line-height:1.6;color:var(--text-primary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.spark-item-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.spark-item-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1;align-items:center}
.mini-tag{font-size:10px;color:var(--theme-light);background:rgba(56,189,248,0.1);padding:2px 7px;border-radius:10px;font-family:var(--font-body)}
.shared-badge{font-size:9px;color:var(--shared-light);background:rgba(196,160,106,0.12);border:1px solid rgba(196,160,106,0.18);padding:1px 7px;border-radius:10px;font-family:var(--font-mono);letter-spacing:0.03em}
.spark-item-time{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);white-space:nowrap;margin-left:8px}

.sidebar-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.btn{
  flex:1;padding:9px 12px;border-radius:var(--radius-xs);font-size:12px;font-family:var(--font-body);
  cursor:pointer;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text-secondary);
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn:hover{border-color:var(--border-active);color:var(--text-primary);background:var(--bg-glass-hover)}

/* ── Main ── */
.main{flex:1;position:relative;overflow:hidden}
.top-controls{
  position:absolute;top:16px;left:16px;right:16px;z-index:25;
  display:flex;align-items:center;gap:8px;pointer-events:none;
}
.top-controls>*{pointer-events:auto}
.toggle-sidebar,.view-btn-wrap{
  height:38px;border-radius:var(--radius-sm);background:var(--bg-glass);border:1px solid var(--border);
  color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:all .2s;backdrop-filter:blur(12px);
}
.toggle-sidebar{width:38px}
.toggle-sidebar:hover,.view-btn-wrap:hover{background:var(--bg-glass-hover);color:var(--text-primary);border-color:var(--border-active)}
.view-btn-wrap{padding:0 4px;gap:2px;overflow:hidden}
.view-btn{
  padding:6px 14px;font-size:11px;font-family:var(--font-body);font-weight:500;
  border:none;background:transparent;color:var(--text-muted);cursor:pointer;
  border-radius:6px;transition:all .2s;white-space:nowrap;
}
.view-btn:hover{color:var(--text-secondary)}
.view-btn.active{background:var(--bg-elevated);color:var(--text-primary)}

.graph-svg{width:100%;height:100%;display:block}

.empty-state{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;
  pointer-events:none;opacity:0;transition:opacity .4s;
}
.empty-state.visible{opacity:1}
.empty-state h2{font-family:var(--font-display);font-size:32px;font-weight:400;margin-bottom:10px;color:var(--text-secondary)}
.empty-state p{font-size:14px;color:var(--text-muted);line-height:1.7}
.empty-state .hint{margin-top:20px;font-size:12px;font-family:var(--font-mono);color:var(--text-muted);opacity:.7}

/* ── Floating Input ── */
.input-bar{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:30;
  width:min(600px,calc(100% - 48px));
  background:var(--bg-glass);border:1px solid var(--border);
  border-radius:16px;backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.03);
  transition:border-color .25s,box-shadow .25s;
}
.input-bar:focus-within{border-color:rgba(245,184,58,0.2);box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 30px rgba(245,184,58,0.06)}
.input-main{display:flex;align-items:flex-start;padding:14px 16px 8px}
.input-icon{color:var(--spark);font-size:18px;margin-top:2px;margin-right:12px;flex-shrink:0;opacity:.8}
.input-content-wrap{flex:1}
.content-input{
  width:100%;background:none;border:none;color:var(--text-primary);font-size:14px;
  font-family:var(--font-body);resize:none;outline:none;line-height:1.6;
  min-height:24px;max-height:120px;
}
.content-input::placeholder{color:var(--text-muted)}
.input-bottom{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 4px}
.tag-input-area{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1}
.input-tag-chip{
  display:inline-flex;align-items:center;gap:4px;padding:3px 9px;font-size:11px;
  border-radius:12px;background:rgba(56,189,248,0.1);color:var(--theme-light);
  font-family:var(--font-body);animation:chipIn .2s ease;
}
@keyframes chipIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
.input-tag-chip .remove{cursor:pointer;opacity:.5;transition:opacity .15s;font-size:13px}
.input-tag-chip .remove:hover{opacity:1}
.tag-text-input{
  background:none;border:none;color:var(--text-secondary);font-size:12px;font-family:var(--font-body);
  outline:none;width:120px;min-width:60px;
}
.tag-text-input::placeholder{color:var(--text-muted)}
.submit-btn{
  width:36px;height:36px;border-radius:10px;background:rgba(245,184,58,0.1);
  border:1px solid rgba(245,184,58,0.2);color:var(--spark);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:all .2s;flex-shrink:0;margin-left:10px;
}
.submit-btn:hover{background:rgba(245,184,58,0.18);border-color:rgba(245,184,58,0.35);transform:scale(1.05)}
.submit-btn:active{transform:scale(0.95)}
.submit-btn:disabled{opacity:.3;cursor:default;transform:none}
/* Tag suggestions */
.tag-suggestions{padding:2px 16px 10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tag-suggest-label{font-size:10px;color:var(--text-muted);margin-right:2px;flex-shrink:0}
.tag-suggest{
  padding:3px 10px;font-size:10px;border-radius:12px;cursor:pointer;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text-muted);
  transition:all .2s;font-family:var(--font-body);
}
.tag-suggest:hover{border-color:var(--theme);color:var(--theme-light);background:rgba(56,189,248,0.06)}
.tag-suggest.used{opacity:.3;pointer-events:none}

/* ── Detail Modal ── */
.detail-overlay{
  position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(7,7,15,0.6);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.detail-overlay.open{opacity:1;pointer-events:auto}
.detail-card{
  width:min(520px,calc(100vw - 48px));max-height:80vh;overflow-y:auto;
  background:var(--bg-surface);border:1px solid var(--border-active);
  border-radius:16px;padding:28px;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
  transform:translateY(12px) scale(0.97);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.detail-overlay.open .detail-card{transform:translateY(0) scale(1)}
.detail-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.detail-time{font-size:12px;font-family:var(--font-mono);color:var(--text-muted)}
.detail-source-badge{
  display:inline-block;font-size:10px;font-family:var(--font-mono);padding:2px 8px;border-radius:10px;
  margin-left:10px;letter-spacing:0.03em;
}
.detail-source-badge.shared{color:var(--shared-light);background:rgba(196,160,106,0.1);border:1px solid rgba(196,160,106,0.15)}
.detail-source-badge.mine{color:var(--spark-light);background:rgba(245,184,58,0.08);border:1px solid rgba(245,184,58,0.12)}
.detail-actions{display:flex;gap:6px}
.btn-icon{
  width:32px;height:32px;border-radius:var(--radius-xs);border:1px solid var(--border);
  background:var(--bg-elevated);color:var(--text-secondary);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;
}
.btn-icon:hover{border-color:var(--border-active);color:var(--text-primary)}
.btn-icon.danger:hover{border-color:var(--accent);color:var(--accent)}
.detail-body{font-size:15px;line-height:1.8;color:var(--text-primary);margin-bottom:20px;white-space:pre-wrap}
.detail-body textarea{
  width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text-primary);font-size:15px;line-height:1.8;font-family:var(--font-body);
  padding:12px;resize:vertical;min-height:80px;outline:none;
}
.detail-body textarea:focus{border-color:var(--border-active)}
.detail-tags{display:flex;flex-wrap:wrap;gap:8px}
.detail-tag{
  padding:5px 14px;font-size:12px;border-radius:20px;
  background:rgba(56,189,248,0.08);color:var(--theme-light);border:1px solid rgba(56,189,248,0.12);
}
.edit-tag-area{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.edit-tag-chip{
  display:inline-flex;align-items:center;gap:5px;padding:5px 12px;font-size:12px;
  border-radius:20px;background:rgba(56,189,248,0.08);color:var(--theme-light);border:1px solid rgba(56,189,248,0.12);
}
.edit-tag-chip .remove{cursor:pointer;opacity:.5;font-size:14px}
.edit-tag-chip .remove:hover{opacity:1}
.edit-tag-input{
  background:none;border:1px dashed var(--border);border-radius:20px;padding:5px 12px;
  color:var(--text-secondary);font-size:12px;font-family:var(--font-body);outline:none;width:100px;
}
.edit-tag-input:focus{border-color:var(--border-active)}
.detail-edit-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.btn-save{
  padding:8px 20px;border-radius:var(--radius-sm);background:rgba(245,184,58,0.12);
  border:1px solid rgba(245,184,58,0.25);color:var(--spark-light);font-size:13px;
  font-family:var(--font-body);cursor:pointer;transition:all .2s;
}
.btn-save:hover{background:rgba(245,184,58,0.2)}
.btn-cancel{
  padding:8px 20px;border-radius:var(--radius-sm);background:var(--bg-elevated);
  border:1px solid var(--border);color:var(--text-secondary);font-size:13px;
  font-family:var(--font-body);cursor:pointer;transition:all .2s;
}
.btn-cancel:hover{color:var(--text-primary)}

/* ── D3 Graph ── */
.link-line{stroke:rgba(255,255,255,0.07);stroke-width:1;transition:stroke .3s,stroke-opacity .3s}
.node-label-theme{
  font-family:var(--font-body);font-size:11px;font-weight:500;fill:var(--theme-light);
  text-anchor:middle;pointer-events:none;paint-order:stroke;stroke:var(--bg-deep);stroke-width:3px;
}
.node-label-spark{
  font-family:var(--font-body);font-size:10px;fill:var(--text-secondary);
  text-anchor:middle;pointer-events:none;opacity:0;transition:opacity .2s;
  paint-order:stroke;stroke:var(--bg-deep);stroke-width:3px;
}
.node-label-spark.always-show{opacity:1}
.node-label-spark{
  font-family:var(--font-body);font-size:10px;fill:var(--text-secondary);
  text-anchor:middle;pointer-events:none;opacity:0;transition:opacity .2s;
  paint-order:stroke;stroke:var(--bg-deep);stroke-width:3px;
}

/* ── Timeline View ── */
.timeline-view{
  position:absolute;inset:0;overflow-y:auto;padding:72px 40px 120px;
  display:none;scrollbar-width:thin;scrollbar-color:var(--bg-elevated) transparent;
}
.timeline-view.active{display:block}
.timeline-view::-webkit-scrollbar{width:5px}
.timeline-view::-webkit-scrollbar-track{background:transparent}
.timeline-view::-webkit-scrollbar-thumb{background:var(--bg-elevated);border-radius:3px}
.tl-section{margin-bottom:40px}
.tl-header{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--theme);flex-shrink:0;box-shadow:0 0 10px var(--theme-glow)}
.tl-theme-name{font-size:16px;font-weight:500;color:var(--text-primary)}
.tl-theme-count{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
.tl-list{position:relative;padding-left:28px}
.tl-list::before{
  content:'';position:absolute;left:4px;top:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,var(--theme-glow),transparent);
}
.tl-card{
  position:relative;margin-bottom:16px;padding:16px 18px;
  background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  transition:border-color .2s,background .2s;cursor:pointer;
}
.tl-card:hover{border-color:var(--border-active);background:var(--bg-elevated)}
.tl-card::before{
  content:'';position:absolute;left:-24px;top:22px;width:8px;height:8px;
  border-radius:50%;background:var(--bg-elevated);border:2px solid var(--theme);
}
.tl-card-date{font-size:11px;font-family:var(--font-mono);color:var(--theme-light);margin-bottom:8px;letter-spacing:0.03em}
.tl-card-content{font-size:14px;line-height:1.75;color:var(--text-primary)}
.tl-card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.tl-card-tag{font-size:10px;padding:2px 8px;border-radius:10px;color:var(--text-muted);background:rgba(255,255,255,0.04)}
.tl-card-shared{font-size:9px;color:var(--shared-light);background:rgba(196,160,106,0.1);border:1px solid rgba(196,160,106,0.15);padding:1px 7px;border-radius:10px;font-family:var(--font-mono)}
.tl-empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px}
.tl-theme-selector{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px;padding-bottom:16px;
  border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:5;
  background:var(--bg-deep);padding-top:8px;
}
.tl-theme-tab{
  padding:7px 16px;font-size:12px;font-family:var(--font-body);font-weight:500;
  border-radius:20px;cursor:pointer;border:1px solid var(--border);
  background:var(--bg-surface);color:var(--text-secondary);transition:all .2s;
}
.tl-theme-tab:hover{border-color:var(--theme);color:var(--theme)}
.tl-theme-tab.active{background:rgba(56,189,248,0.1);border-color:var(--theme);color:var(--theme-light)}
.tl-theme-tab .tl-tab-count{font-size:10px;opacity:.5;margin-left:4px}

/* ── Record View ── */
.record-view{
  position:absolute;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;
}
.record-view.active{display:flex}
.record-hero{text-align:center;margin-bottom:56px;padding:0 20px}
.record-hero h2{font-family:var(--font-display);font-size:44px;font-weight:400;color:var(--text-primary);margin-bottom:18px}
.record-hero p{font-size:16px;color:var(--text-muted);line-height:1.9}
.record-hero .hint{margin-top:22px;font-size:12px;font-family:var(--font-mono);color:var(--text-muted);opacity:.6}
.record-input-area{
  width:min(720px,calc(100% - 48px));
  background:var(--bg-glass);border:1px solid var(--border);
  border-radius:20px;backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.03);
  transition:border-color .25s,box-shadow .25s;
}
.record-input-area:focus-within{border-color:rgba(245,184,58,0.2);box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 30px rgba(245,184,58,0.06)}
.record-input-area .input-main{display:flex;align-items:flex-start;padding:20px 22px 12px}
.record-input-area .input-icon{font-size:22px;margin-top:4px}
.record-input-area .content-input{font-size:16px;min-height:36px;max-height:180px;line-height:1.7}
.record-input-area .input-bottom{display:flex;align-items:center;justify-content:space-between;padding:6px 22px 6px}
.record-input-area .tag-text-input{font-size:13px;width:140px}
.record-input-area .submit-btn{width:42px;height:42px;border-radius:12px;font-size:18px}
.record-input-area .tag-suggestions{padding:4px 22px 14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.record-input-area .tag-suggest{padding:4px 12px;font-size:11px}
.record-input-area .input-tag-chip{padding:4px 11px;font-size:12px}
.record-recent{margin-top:40px;width:min(720px,calc(100% - 48px))}
.record-recent-title{font-size:12px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:14px;letter-spacing:0.03em}
.record-recent-list{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg-elevated) transparent}
.record-recent-item{
  padding:14px 18px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);
  font-size:13px;line-height:1.7;color:var(--text-secondary);cursor:pointer;transition:all .2s;
  display:flex;justify-content:space-between;align-items:flex-start;gap:14px;
}
.record-recent-item:hover{border-color:var(--border-active);background:var(--bg-elevated)}
.record-recent-text{flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.record-recent-time{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);white-space:nowrap;flex-shrink:0}

/* ── Toast ── */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg-elevated);border:1px solid var(--border-active);color:var(--text-primary);
  padding:10px 22px;border-radius:var(--radius);font-size:13px;font-family:var(--font-body);
  opacity:0;transition:all .3s;z-index:100;pointer-events:none;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  .sidebar{position:absolute;z-index:30;box-shadow:8px 0 40px rgba(0,0,0,0.5)}
  :root{--sidebar-w:280px}
  .timeline-view{padding:72px 16px 120px}
}

@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.theme-pulse{animation:pulse 3s ease-in-out infinite}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-elevated);border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><span class="logo-spark">&#10024;</span> SparkGraph</div>
      <div class="sidebar-stats" id="stats"></div>
    </div>
    <div class="sidebar-search">
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input class="search-input" id="searchInput" type="text" placeholder="搜索灵感..." spellcheck="false">
      </div>
    </div>
    <div class="source-filter" id="sourceFilter">
      <button class="source-btn active" data-source="mine">灵感之河</button>
    </div>
    <div class="tag-filters" id="tagFilters"></div>
    <div class="spark-list" id="sparkList"></div>
    <div class="sidebar-footer">
      <button class="btn" id="btnImport">&#8593; 导入</button>
      <button class="btn" id="btnExport">&#8595; 导出</button>
    </div>
  </aside>

  <div class="main" id="mainArea">
    <div class="top-controls">
      <button class="toggle-sidebar" id="toggleSidebar">&#9776;</button>
      <div class="view-btn-wrap">
        <button class="view-btn" data-view="record">记录</button>
        <button class="view-btn active" data-view="graph">星图</button>
        <button class="view-btn" data-view="timeline">时间轴</button>
      </div>
    </div>
    <svg class="graph-svg" id="graphSvg"></svg>
    <div class="timeline-view" id="timelineView"></div>
    <div class="record-view" id="recordView">
      <div class="record-hero">
        <h2>让灵感流淌</h2>
        <p>在下方写下此刻的想法，<br>它们会在星图中自动交织成网络</p>
        <div class="hint">按 N 随时开始记录</div>
      </div>
      <div class="record-input-area">
        <div class="input-main">
          <span class="input-icon">&#9998;</span>
          <div class="input-content-wrap">
            <textarea class="content-input record-content" id="recordContentInput" rows="1" placeholder="此刻的灵感是..." spellcheck="false"></textarea>
          </div>
        </div>
        <div class="input-bottom">
          <div class="tag-input-area" id="recordTagInputArea">
            <input class="tag-text-input" id="recordTagTextInput" placeholder="输入标签，按回车添加" spellcheck="false">
          </div>
          <button class="submit-btn" id="recordSubmitBtn" disabled title="保存 (Ctrl+Enter)">&#10148;</button>
        </div>
        <div class="tag-suggestions" id="recordTagSuggestions"></div>
      </div>
      <div class="record-recent" id="recordRecent"></div>
    </div>
    <div class="empty-state" id="emptyState">
      <h2>让灵感流淌</h2>
      <p>在下方写下此刻的想法，<br>它们会在星图中自动交织成网络</p>
      <div class="hint">按 N 随时开始记录</div>
    </div>

    <div class="input-bar" id="inputBar">
      <div class="input-main">
        <span class="input-icon">&#9998;</span>
        <div class="input-content-wrap">
          <textarea class="content-input" id="contentInput" rows="1" placeholder="此刻的灵感是..." spellcheck="false"></textarea>
        </div>
      </div>
      <div class="input-bottom">
        <div class="tag-input-area" id="tagInputArea">
          <input class="tag-text-input" id="tagTextInput" placeholder="输入标签，按回车添加" spellcheck="false">
        </div>
        <button class="submit-btn" id="submitBtn" disabled title="保存 (Ctrl+Enter)">&#10148;</button>
      </div>
      <div class="tag-suggestions" id="tagSuggestions"></div>
    </div>
  </div>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card" id="detailCard"></div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
let sharedSparks = [], localSparks = [];
let currentTags = [], activeFilter = null, sourceFilter = 'mine', searchQuery = '';
let selectedSparkId = null, editingId = null, sidebarOpen = true;
let viewMode = 'graph'; // 'graph' | 'timeline'
let isFullTextMode = false;
let timelineTheme = null; // null = show all, string = specific theme

const PRESET_TAGS = ['产品设计','运营思路','职场心得','技术架构','团队协作','思维模型','效率方法','管理方法'];

const SAMPLE_SPARKS = [
  { id:'sample_001', content:'用户在等待加载时最容易流失，可以在加载过程中加入有趣的微交互来留住注意力——比如进度条变成小游戏', tags:['用户体验','产品设计'], createdAt:'2026-02-28T09:15:00Z' },
  { id:'sample_002', content:'知识管理应该像花园而非仓库：需要定期修剪和培育，不是一味堆积。定期回顾比不停记录更重要', tags:['知识管理','思维模型'], createdAt:'2026-02-27T14:30:00Z' },
  { id:'sample_003', content:'团队复盘时先写「做对了什么」再写「可以改进什么」，心理安全感会显著提升', tags:['团队协作','管理方法'], createdAt:'2026-02-26T16:45:00Z' },
  { id:'sample_004', content:'好的 API 设计就像好的笑话——如果需要解释，那就不够好。接口命名要让人一看就懂', tags:['技术架构','产品设计'], createdAt:'2026-02-25T11:20:00Z' },
  { id:'sample_005', content:'周报不要写「做了什么」，要写「为什么做、带来了什么影响」。这训练的是战略思维而不是执行汇报', tags:['团队协作','知识管理'], createdAt:'2026-02-24T10:00:00Z' },
  { id:'sample_006', content:'把复杂问题拆成「可以在 30 分钟内完成的子任务」，这是对抗拖延最有效的框架', tags:['效率方法','思维模型'], createdAt:'2026-02-23T08:30:00Z' },
  { id:'sample_007', content:'设计系统的核心不是组件库，而是共识。没有共识的组件库只会制造另一种混乱', tags:['产品设计','技术架构'], createdAt:'2026-02-22T15:10:00Z' },
  { id:'sample_008', content:'用「五个为什么」追问法分析线上事故，通常第三个为什么就能找到真正的系统性问题', tags:['技术架构','思维模型'], createdAt:'2026-02-21T13:00:00Z' },
  { id:'sample_009', content:'远程会议超过 45 分钟效率急剧下降。把长会拆成多个 25 分钟焦点会议更好', tags:['团队协作','效率方法'], createdAt:'2026-02-20T09:50:00Z' },
  { id:'sample_010', content:'每天写三条「今日学到」，一个月后回顾会发现惊人的知识积累速度', tags:['知识管理','效率方法'], createdAt:'2026-02-19T17:30:00Z' }
];

function getMergedSparks() {
  const local = localSparks.map(s => ({ ...s, _shared: false }));
  return local.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
}

// ═══════════════════════════════════════════
// Utilities
// ═══════════════════════════════════════════
function uid() { return crypto.randomUUID ? crypto.randomUUID() : 'sp_' + Date.now() + '_' + Math.random().toString(36).slice(2,10); }
function relativeTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
  if (m < 1) return '刚刚'; if (m < 60) return m + '分钟前';
  if (h < 24) return h + '小时前'; if (d < 30) return d + '天前';
  return new Date(iso).toLocaleDateString('zh-CN');
}
function fullTime(iso) { return new Date(iso).toLocaleString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function dateLabel(iso) { const d = new Date(iso); return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); }
function truncate(str, n) { return str.length > n ? str.slice(0,n) + '…' : str; }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function allTags() {
  const m = {};
  getMergedSparks().forEach(s => {
    s.tags.forEach(t => { m[t] = (m[t]||0) + 1; });
  });
  return Object.entries(m).sort((a,b) => b[1]-a[1]);
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════
// Data Management
// ═══════════════════════════════════════════
function addSpark(content, tags) {
  const spark = { id: uid(), content: content.trim(), tags: [...tags], createdAt: new Date().toISOString() };
  localSparks.unshift(spark); saveLocal(); return spark;
}
function updateSpark(id, content, tags) {
  const s = localSparks.find(x => x.id === id);
  if (s) { s.content = content.trim(); s.tags = [...tags]; saveLocal(); }
}
function deleteSpark(id) { localSparks = localSparks.filter(x => x.id !== id); saveLocal(); }
function hideSharedSpark(id) {
  let hidden = [];
  try { const d = localStorage.getItem('sparkgraph_hidden'); if (d) hidden = JSON.parse(d); } catch(e) {}
  if (!hidden.includes(id)) hidden.push(id);
  try { localStorage.setItem('sparkgraph_hidden', JSON.stringify(hidden)); } catch(e) {}
  sharedSparks = sharedSparks.filter(x => x.id !== id);
}
function getHiddenIds() {
  try { const d = localStorage.getItem('sparkgraph_hidden'); return d ? JSON.parse(d) : []; } catch(e) { return []; }
}
function saveLocal() { try { localStorage.setItem('sparkgraph_local', JSON.stringify(localSparks)); } catch(e) {} }
function loadLocal() { try { const d = localStorage.getItem('sparkgraph_local'); if (d) localSparks = JSON.parse(d); } catch(e) {} }
async function loadSharedData() {
  try {
    const res = await fetch('./sparks.json');
    if (!res.ok) return;
    const data = await res.json();
    if (Array.isArray(data)) { data.forEach(s => { if (!s.id) s.id = 'shared_'+uid(); if (!s.createdAt) s.createdAt = new Date().toISOString(); }); const hidden = getHiddenIds(); sharedSparks = data.filter(s => !hidden.includes(s.id)); }
  } catch(e) {}
}
function exportData() {
  const blob = new Blob([JSON.stringify(localSparks, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `sparkgraph-${new Date().toISOString().slice(0,10)}.json`; a.click();
  toast('已导出 ' + localSparks.length + ' 条个人灵感');
}
function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw 0;
      data.forEach(s => { if (!s.content||!Array.isArray(s.tags)) throw 0; if (!s.id) s.id=uid(); if (!s.createdAt) s.createdAt=new Date().toISOString(); });
      localSparks = data; saveLocal(); refreshAll(); toast('已导入 ' + data.length + ' 条灵感');
    } catch(err) { toast('导入失败：文件格式不正确'); }
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════
// Filtered Sparks
// ═══════════════════════════════════════════
function filteredSparks() {
  let list = getMergedSparks();
  if (activeFilter) list = list.filter(s => s.tags.includes(activeFilter));
  if (searchQuery) { const q = searchQuery.toLowerCase(); list = list.filter(s => s.content.toLowerCase().includes(q) || s.tags.some(t => t.toLowerCase().includes(q))); }
  return list;
}

// ═══════════════════════════════════════════
// Sidebar Rendering
// ═══════════════════════════════════════════
function renderStats() {
  const lc = localSparks.length;
  document.getElementById('stats').textContent = lc + ' sparks · ' + allTags().length + ' themes';
}
function renderSourceFilter() {
  const c = localSparks.length;
  document.querySelectorAll('.source-btn').forEach(b => {
    b.classList.add('active');
    b.innerHTML = '灵感之河<span class="source-count">' + c + '</span>';
  });
}
function renderTagFilters() {
  const el = document.getElementById('tagFilters'), tags = allTags();
  el.innerHTML = tags.map(([t,c]) =>
    `<span class="tag-chip${activeFilter===t?' active':''}" data-tag="${escHtml(t)}">${escHtml(t)}<span style="opacity:.4;margin-left:3px">${c}</span></span>`
  ).join('');
  el.querySelectorAll('.tag-chip').forEach(chip => {
    chip.onclick = () => { const tag=chip.dataset.tag; activeFilter=activeFilter===tag?null:tag; renderTagFilters(); renderSparkList(); updateCurrentView(); };
  });
}
function renderSparkList() {
  const el = document.getElementById('sparkList'), list = filteredSparks();
  if (!list.length) { el.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px">'+(sharedSparks.length+localSparks.length===0?'还没有灵感记录':'没有匹配的灵感')+'</div>'; return; }
  el.innerHTML = list.map(s => `
    <div class="spark-item${selectedSparkId===s.id?' active':''}" data-id="${s.id}">
      <div class="spark-item-content">${escHtml(s.content)}</div>
      <div class="spark-item-meta">
        <div class="spark-item-tags">${s.tags.map(t=>'<span class="mini-tag">'+escHtml(t)+'</span>').join('')}</div>
        <span class="spark-item-time">${relativeTime(s.createdAt)}</span>
      </div>
    </div>`).join('');
  el.querySelectorAll('.spark-item').forEach(item => {
    item.onclick = () => { selectedSparkId=item.dataset.id; highlightNode(selectedSparkId); openDetail(selectedSparkId); renderSparkList(); };
  });
}

// ═══════════════════════════════════════════
// Tag Suggestions
// ═══════════════════════════════════════════
function renderTagSuggestions() {
  const el = document.getElementById('tagSuggestions');
  // Merge presets with top existing tags
  const existing = allTags().map(([t]) => t);
  const combined = [...new Set([...PRESET_TAGS, ...existing])].slice(0, 10);
  el.innerHTML = '<span class="tag-suggest-label">快选:</span>' +
    combined.map(t => `<span class="tag-suggest${currentTags.includes(t)?' used':''}" data-tag="${escHtml(t)}">${escHtml(t)}</span>`).join('');
  el.querySelectorAll('.tag-suggest:not(.used)').forEach(s => {
    s.onclick = () => { const t=s.dataset.tag; if (t&&!currentTags.includes(t)) { currentTags.push(t); renderInputTags(); renderTagSuggestions(); } };
  });
}

// ═══════════════════════════════════════════
// Detail Modal
// ═══════════════════════════════════════════
function findSparkById(id) { return getMergedSparks().find(x => x.id === id); }
function openDetail(id) {
  const s = findSparkById(id); if (!s) return;
  editingId = null;
  const card = document.getElementById('detailCard');
  card.innerHTML = `
    <div class="detail-top"><div><span class="detail-time">${fullTime(s.createdAt)}</span><span class="detail-source-badge mine">灵感之河</span></div>
      <div class="detail-actions"><button class="btn-icon" id="detailEdit">&#9998;</button><button class="btn-icon danger" id="detailDelete">&#128465;</button><button class="btn-icon" id="detailClose">&#10005;</button></div>
    </div>
    <div class="detail-body">${escHtml(s.content)}</div>
    <div class="detail-tags">${s.tags.map(t=>'<span class="detail-tag">'+escHtml(t)+'</span>').join('')}</div>`;
  card.querySelector('#detailClose').onclick = closeDetail;
  card.querySelector('#detailDelete').onclick = () => {
    if (confirm('确定删除这条灵感？')) {
      deleteSpark(id);
      closeDetail(); refreshAll();
    }
  };
  card.querySelector('#detailEdit').onclick = () => openEditMode(id);
  document.getElementById('detailOverlay').classList.add('open');
}
function openEditMode(id) {
  const s = findSparkById(id); if (!s) return;
  editingId = id; const editTags = [...s.tags];
  const card = document.getElementById('detailCard');
  card.innerHTML = `
    <div class="detail-top"><span class="detail-time">${fullTime(s.createdAt)}</span><div class="detail-actions"><button class="btn-icon" id="detailClose">&#10005;</button></div></div>
    <div class="detail-body"><textarea id="editContent">${escHtml(s.content)}</textarea></div>
    <div class="edit-tag-area" id="editTagArea"></div>
    <div class="detail-edit-actions"><button class="btn-cancel" id="editCancel">取消</button><button class="btn-save" id="editSave">保存</button></div>`;
  function rET() {
    const area = card.querySelector('#editTagArea');
    area.innerHTML = editTags.map((t,i) => `<span class="edit-tag-chip">${escHtml(t)}<span class="remove" data-idx="${i}">&#10005;</span></span>`).join('') + '<input class="edit-tag-input" id="editTagInput" placeholder="+ 标签">';
    area.querySelectorAll('.remove').forEach(r => { r.onclick=()=>{editTags.splice(+r.dataset.idx,1);rET();}; });
    const inp = area.querySelector('#editTagInput');
    inp.onkeydown = (e) => { if ((e.key==='Enter'||e.key===',')&&inp.value.trim()) { e.preventDefault(); const t=inp.value.trim().replace(/^#/,''); if (t&&!editTags.includes(t)) editTags.push(t); inp.value=''; rET(); } };
  }
  rET();
  card.querySelector('#detailClose').onclick = closeDetail;
  card.querySelector('#editCancel').onclick = () => openDetail(id);
  card.querySelector('#editSave').onclick = () => { const c=card.querySelector('#editContent').value; if (!c.trim()){toast('内容不能为空');return;} updateSpark(id,c,editTags); closeDetail(); refreshAll(); toast('已更新'); };
  card.querySelector('#editContent').focus();
}
function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); selectedSparkId=null; editingId=null; renderSparkList(); resetHighlight(); }

// ═══════════════════════════════════════════
// D3 Force Graph
// ═══════════════════════════════════════════
let simulation, svgSel, gLinks, gNodes, zoom, hasAutoFitted;

function calcFullTextMode(sparkCount) {
  return false; // Disable full-text mode for now
}

function buildGraphData() {
  const filtered = filteredSparks();
  const sparkNodes = filtered.filter(s => true); // all are sparks
  isFullTextMode = calcFullTextMode(sparkNodes.length);
  const themeMap = {}, nodes = [], links = [];
  filtered.forEach(s => {
    nodes.push({ id:s.id, type:'spark', shared:!!s._shared, label: isFullTextMode ? s.content : truncate(s.content,24), content:s.content, tags:s.tags });
    s.tags.forEach(t => {
      if (!themeMap[t]) { themeMap[t]={id:'theme_'+t,type:'theme',label:t,count:0}; nodes.push(themeMap[t]); }
      themeMap[t].count++; links.push({source:s.id,target:'theme_'+t});
    });
  });
  return { nodes, links };
}

function initGraph() {
  const svg = d3.select('#graphSvg');
  const width = svg.node().clientWidth, height = svg.node().clientHeight;
  svg.selectAll('*').remove();
  const defs = svg.append('defs');
  [['glow-spark',4],['glow-shared',3],['glow-theme',6]].forEach(([id,sd]) => {
    const f = defs.append('filter').attr('id',id).attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
    f.append('feGaussianBlur').attr('stdDeviation',sd).attr('result','blur');
    const m = f.append('feMerge'); m.append('feMergeNode').attr('in','blur'); m.append('feMergeNode').attr('in','SourceGraphic');
  });
  const container = svg.append('g').attr('class','graph-container');
  gLinks = container.append('g'); gNodes = container.append('g');
  zoom = d3.zoom().scaleExtent([0.15,4]).on('zoom', e => container.attr('transform',e.transform));
  svg.call(zoom);
  svgSel = svg;
  simulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(d=>d.id))
    .force('charge', d3.forceManyBody())
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collision', d3.forceCollide())
    .force('x', d3.forceX(width/2).strength(0.04))
    .force('y', d3.forceY(height/2).strength(0.04))
    .alphaDecay(0.02);
  updateGraph();
}

function zoomToFit() {
  const nodes = simulation.nodes();
  if (nodes.length === 0) return;
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  nodes.forEach(n => { minX=Math.min(minX,n.x); maxX=Math.max(maxX,n.x); minY=Math.min(minY,n.y); maxY=Math.max(maxY,n.y); });
  const pad = isFullTextMode ? 160 : 80;
  const w = svgSel.node().clientWidth, h = svgSel.node().clientHeight;
  const dx = (maxX-minX)+pad*2, dy = (maxY-minY)+pad*2;
  const scale = Math.min(w/dx, h/dy, 1.8);
  const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
  svgSel.transition().duration(700).call(zoom.transform,
    d3.zoomIdentity.translate(w/2,h/2).scale(scale).translate(-cx,-cy));
}

function updateGraph() {
  const { nodes, links } = buildGraphData();
  const w = svgSel.node().clientWidth, h = svgSel.node().clientHeight;
  hasAutoFitted = false;

  document.getElementById('emptyState').classList.toggle('visible', nodes.length===0 && viewMode==='graph');

  // Adjust forces based on mode
  const ld = isFullTextMode ? 170 : 90;
  const cs = isFullTextMode ? -450 : -180;
  const cr = d => d.type==='theme' ? 32 : (isFullTextMode ? 65 : 18);
  simulation.force('link').distance(ld);
  simulation.force('charge').strength(cs);
  simulation.force('collision').radius(cr);
  simulation.force('center', d3.forceCenter(w/2, h/2));
  simulation.force('x', d3.forceX(w/2).strength(0.04));
  simulation.force('y', d3.forceY(h/2).strength(0.04));

  // Links
  const linkSel = gLinks.selectAll('line').data(links, d=>(d.source.id||d.source)+'-'+(d.target.id||d.target));
  linkSel.exit().transition().duration(300).attr('stroke-opacity',0).remove();
  const linkE = linkSel.enter().append('line').attr('class','link-line').attr('stroke-opacity',0);
  linkE.transition().duration(500).attr('stroke-opacity',1);
  const allLinks = linkE.merge(linkSel);

  // Nodes
  const nodeSel = gNodes.selectAll('g.node').data(nodes, d=>d.id);
  nodeSel.exit().transition().duration(300).attr('opacity',0).remove();
  const nodeE = nodeSel.enter().append('g').attr('class','node').attr('opacity',0);

  nodeE.each(function(d) {
    const g = d3.select(this);
    if (d.type==='theme') {
      const r = Math.min(12+(d.count||1)*3, 28);
      g.append('circle').attr('r',0).attr('fill','var(--theme)').attr('fill-opacity',0.15).attr('stroke','var(--theme)').attr('stroke-width',1.5).attr('stroke-opacity',0.5).attr('filter','url(#glow-theme)').attr('class','theme-pulse').transition().duration(500).attr('r',r);
      g.append('text').attr('class','node-label-theme').attr('dy',r+16).text(d.label);
    } else {
      g.append('circle').attr('r',0).attr('fill','var(--spark)').attr('fill-opacity',0.7).attr('stroke','var(--spark-light)').attr('stroke-width',1).attr('stroke-opacity',0.4).attr('filter','url(#glow-spark)').transition().duration(500).attr('r',7);
      g.append('text').attr('class','node-label-spark').attr('dy',22).text(d.label);
    }
  });
  nodeE.transition().duration(500).attr('opacity',1);
  const allNodes = nodeE.merge(nodeSel);

  allNodes.each(function(d) {
    if (d.type==='theme') {
      const r = Math.min(12+(d.count||1)*3,28);
      d3.select(this).select('circle').transition().duration(400).attr('r',r);
      d3.select(this).select('text').attr('dy',r+16);
    }
  });

  // Interactions
  allNodes
    .on('mouseenter', function(ev, d) {
      const conn = new Set([d.id]);
      links.forEach(l => { const s=l.source.id||l.source,t=l.target.id||l.target; if(s===d.id) conn.add(t); if(t===d.id) conn.add(s); });
      allNodes.attr('opacity', n=>conn.has(n.id)?1:0.12);
      allLinks.attr('stroke', l=>{ const s=l.source.id||l.source,t=l.target.id||l.target; return (s===d.id||t===d.id)?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.02)'; })
        .attr('stroke-width', l=>{ const s=l.source.id||l.source,t=l.target.id||l.target; return (s===d.id||t===d.id)?1.5:1; });
      d3.select(this).select('.node-label-spark').style('opacity',1);
    })
    .on('mouseleave', resetHighlight)
    .on('click', function(ev, d) {
      ev.stopPropagation();
      if (d.type==='spark') { selectedSparkId=d.id; renderSparkList(); openDetail(d.id); }
      else { activeFilter=activeFilter===d.label?null:d.label; renderTagFilters(); renderSparkList(); updateGraph(); }
    });

  allNodes.call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(0.15).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;})
  );

  simulation.nodes(nodes);
  simulation.force('link').links(links);
  simulation.alpha(0.6).restart();
  simulation.on('tick', () => {
    allLinks.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    allNodes.attr('transform', d=>`translate(${d.x},${d.y})`);
    if (!hasAutoFitted && simulation.alpha() < 0.08) { hasAutoFitted = true; zoomToFit(); }
  });
}

function highlightNode(id) { if (gNodes) gNodes.selectAll('g.node').attr('opacity', d=>d.id===id?1:0.2); }
function resetHighlight() {
  if (!gNodes) return;
  gNodes.selectAll('g.node').attr('opacity',1);
  gNodes.selectAll('.node-label-spark').style('opacity',null);
  if (gLinks) gLinks.selectAll('line').attr('stroke','rgba(255,255,255,0.07)').attr('stroke-width',1);
}

// ═══════════════════════════════════════════
// Timeline View
// ═══════════════════════════════════════════
function renderTimeline() {
  const el = document.getElementById('timelineView');
  const list = filteredSparks();
  if (!list.length) { el.innerHTML = '<div class="tl-empty">没有匹配的灵感</div>'; return; }

  // Build tag map for all sparks
  const tagMap = {};
  list.forEach(s => {
    s.tags.forEach(t => {
      if (!tagMap[t]) tagMap[t] = [];
      tagMap[t].push(s);
    });
  });
  const tagEntries = Object.entries(tagMap).sort((a,b) => b[1].length - a[1].length);
  tagEntries.forEach(([,arr]) => arr.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt)));

  // Validate timelineTheme still exists
  if (timelineTheme && !tagMap[timelineTheme]) timelineTheme = null;

  // Which sections to show
  const visibleEntries = timelineTheme ? tagEntries.filter(([t]) => t === timelineTheme) : tagEntries;

  // Build theme selector tabs
  const selectorHtml = `<div class="tl-theme-selector">
    <span class="tl-theme-tab${timelineTheme===null?' active':''}" data-theme="">全部主题</span>
    ${tagEntries.map(([t,arr]) => `<span class="tl-theme-tab${timelineTheme===t?' active':''}" data-theme="${escHtml(t)}">${escHtml(t)}<span class="tl-tab-count">${arr.length}</span></span>`).join('')}
  </div>`;

  // Build timeline sections
  const sectionsHtml = visibleEntries.map(([tag, sparks]) => `
    <div class="tl-section">
      <div class="tl-header">
        <span class="tl-dot"></span>
        <span class="tl-theme-name">${escHtml(tag)}</span>
        <span class="tl-theme-count">${sparks.length} 条灵感</span>
      </div>
      <div class="tl-list">
        ${sparks.map(s => `
          <div class="tl-card" data-id="${s.id}">
            <div class="tl-card-date">${dateLabel(s.createdAt)}</div>
            <div class="tl-card-content">${escHtml(s.content)}</div>
            <div class="tl-card-tags">
              ${s.tags.filter(t=>t!==tag).map(t=>'<span class="tl-card-tag">'+escHtml(t)+'</span>').join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  el.innerHTML = selectorHtml + sectionsHtml;

  // Bind theme tabs
  el.querySelectorAll('.tl-theme-tab').forEach(tab => {
    tab.onclick = () => {
      const t = tab.dataset.theme;
      timelineTheme = t || null;
      renderTimeline();
    };
  });
  // Bind cards
  el.querySelectorAll('.tl-card').forEach(card => {
    card.onclick = () => { openDetail(card.dataset.id); };
  });
}

// ═══════════════════════════════════════════
// View Toggle
// ═══════════════════════════════════════════
function setViewMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view===mode));
  document.getElementById('graphSvg').style.display = mode==='graph' ? 'block' : 'none';
  document.getElementById('timelineView').classList.toggle('active', mode==='timeline');
  document.getElementById('recordView').classList.toggle('active', mode==='record');
  document.getElementById('emptyState').classList.toggle('visible', false);
  document.getElementById('inputBar').style.display = mode==='record' ? 'none' : 'block';
  updateCurrentView();
}
function updateCurrentView() {
  if (viewMode === 'graph') updateGraph();
  else if (viewMode === 'timeline') renderTimeline();
  else if (viewMode === 'record') renderRecordView();
}
document.querySelectorAll('.view-btn').forEach(b => { b.addEventListener('click', () => setViewMode(b.dataset.view)); });

// ═══════════════════════════════════════════
// Record View
// ═══════════════════════════════════════════
let recordTags = [];
const recordContentInput = document.getElementById('recordContentInput');
const recordTagTextInput = document.getElementById('recordTagTextInput');
const recordSubmitBtn = document.getElementById('recordSubmitBtn');
const recordTagInputArea = document.getElementById('recordTagInputArea');

function renderRecordInputTags() {
  recordTagInputArea.querySelectorAll('.input-tag-chip').forEach(c=>c.remove());
  recordTags.forEach((t,i) => {
    const chip = document.createElement('span'); chip.className='input-tag-chip';
    chip.innerHTML = escHtml(t)+'<span class="remove" data-idx="'+i+'">&#10005;</span>';
    recordTagInputArea.insertBefore(chip, recordTagTextInput);
    chip.querySelector('.remove').onclick = () => { recordTags.splice(i,1); renderRecordInputTags(); renderRecordTagSuggestions(); };
  });
}
function renderRecordTagSuggestions() {
  const el = document.getElementById('recordTagSuggestions');
  const existing = allTags().map(([t]) => t);
  const combined = [...new Set([...PRESET_TAGS, ...existing])].slice(0, 10);
  el.innerHTML = '<span class="tag-suggest-label">快选:</span>' +
    combined.map(t => `<span class="tag-suggest${recordTags.includes(t)?' used':''}" data-tag="${escHtml(t)}">${escHtml(t)}</span>`).join('');
  el.querySelectorAll('.tag-suggest:not(.used)').forEach(s => {
    s.onclick = () => { const t=s.dataset.tag; if (t&&!recordTags.includes(t)) { recordTags.push(t); renderRecordInputTags(); renderRecordTagSuggestions(); } };
  });
}
function submitRecordSpark() {
  const content = recordContentInput.value.trim(); if (!content) return;
  addSpark(content, recordTags);
  recordContentInput.value=''; recordTags=[]; recordTagTextInput.value='';
  renderRecordInputTags(); recordSubmitBtn.disabled=true; renderRecordTagSuggestions();
  recordContentInput.style.height='auto';
  renderRecordRecent();
  refreshAll();
  toast('一条灵感已丢入灵感之河');
}
function renderRecordRecent() {
  const el = document.getElementById('recordRecent');
  const recent = localSparks.slice(0, 5);
  if (!recent.length) { el.innerHTML=''; return; }
  el.innerHTML = '<div class="record-recent-title">// 最近记录</div><div class="record-recent-list">' +
    recent.map(s => `<div class="record-recent-item" data-id="${s.id}"><span class="record-recent-text">${escHtml(s.content)}</span><span class="record-recent-time">${relativeTime(s.createdAt)}</span></div>`).join('') + '</div>';
  el.querySelectorAll('.record-recent-item').forEach(item => { item.onclick = () => openDetail(item.dataset.id); });
}
function renderRecordView() {
  renderRecordTagSuggestions();
  renderRecordRecent();
}
recordContentInput.addEventListener('input', () => { recordSubmitBtn.disabled=!recordContentInput.value.trim(); recordContentInput.style.height='auto'; recordContentInput.style.height=recordContentInput.scrollHeight+'px'; });
recordTagTextInput.addEventListener('keydown', (e) => {
  if ((e.key==='Enter'||e.key===','||e.key===' ')&&recordTagTextInput.value.trim()) {
    e.preventDefault(); const t=recordTagTextInput.value.trim().replace(/^#+/,'').replace(/,$/,'');
    if (t&&!recordTags.includes(t)) { recordTags.push(t); renderRecordInputTags(); renderRecordTagSuggestions(); } recordTagTextInput.value='';
  }
  if (e.key==='Backspace'&&!recordTagTextInput.value&&recordTags.length) { recordTags.pop(); renderRecordInputTags(); renderRecordTagSuggestions(); }
});
recordSubmitBtn.addEventListener('click', submitRecordSpark);
recordContentInput.addEventListener('keydown', (e) => { if (e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();submitRecordSpark();} });

// ═══════════════════════════════════════════
// Input Bar
// ═══════════════════════════════════════════
const contentInput = document.getElementById('contentInput');
const tagTextInput = document.getElementById('tagTextInput');
const submitBtn = document.getElementById('submitBtn');
const tagInputArea = document.getElementById('tagInputArea');

function renderInputTags() {
  tagInputArea.querySelectorAll('.input-tag-chip').forEach(c=>c.remove());
  currentTags.forEach((t,i) => {
    const chip = document.createElement('span'); chip.className='input-tag-chip';
    chip.innerHTML = escHtml(t)+'<span class="remove" data-idx="'+i+'">&#10005;</span>';
    tagInputArea.insertBefore(chip, tagTextInput);
    chip.querySelector('.remove').onclick = () => { currentTags.splice(i,1); renderInputTags(); renderTagSuggestions(); };
  });
}
function checkSubmitState() { submitBtn.disabled = !contentInput.value.trim(); }
function submitSpark() {
  const content = contentInput.value.trim(); if (!content) return;
  addSpark(content, currentTags);
  contentInput.value=''; currentTags=[]; tagTextInput.value='';
  renderInputTags(); checkSubmitState(); renderTagSuggestions();
  contentInput.style.height='auto'; refreshAll(); toast('一条灵感已丢入灵感之河');
}
contentInput.addEventListener('input', () => { checkSubmitState(); contentInput.style.height='auto'; contentInput.style.height=contentInput.scrollHeight+'px'; });
tagTextInput.addEventListener('keydown', (e) => {
  if ((e.key==='Enter'||e.key===','||e.key===' ')&&tagTextInput.value.trim()) {
    e.preventDefault(); const t=tagTextInput.value.trim().replace(/^#+/,'').replace(/,$/,'');
    if (t&&!currentTags.includes(t)) { currentTags.push(t); renderInputTags(); renderTagSuggestions(); } tagTextInput.value='';
  }
  if (e.key==='Backspace'&&!tagTextInput.value&&currentTags.length) { currentTags.pop(); renderInputTags(); renderTagSuggestions(); }
});
submitBtn.addEventListener('click', submitSpark);
contentInput.addEventListener('keydown', (e) => { if (e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();submitSpark();} });

// ═══════════════════════════════════════════
// Other Controls
// ═══════════════════════════════════════════
document.getElementById('toggleSidebar').addEventListener('click', () => { sidebarOpen=!sidebarOpen; document.getElementById('sidebar').classList.toggle('collapsed',!sidebarOpen); });
document.querySelectorAll('.source-btn').forEach(b => { b.addEventListener('click', () => { activeFilter=null; renderSourceFilter(); renderTagFilters(); renderSparkList(); updateCurrentView(); }); });
document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery=e.target.value.trim(); renderSparkList(); updateCurrentView(); });
document.getElementById('btnExport').addEventListener('click', exportData);
document.getElementById('btnImport').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', (e) => { if(e.target.files[0]) importData(e.target.files[0]); e.target.value=''; });
document.addEventListener('keydown', (e) => {
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if (e.key==='n'||e.key==='N'||e.key==='/') { e.preventDefault(); contentInput.focus(); }
  if (e.key==='Escape') closeDetail();
});
document.getElementById('detailOverlay').addEventListener('click', (e) => { if(e.target===e.currentTarget) closeDetail(); });
let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer=setTimeout(()=>{ if(viewMode==='graph'&&simulation){ const svg=document.getElementById('graphSvg'); const w=svg.clientWidth,h=svg.clientHeight; simulation.force('center',d3.forceCenter(w/2,h/2)); simulation.force('x',d3.forceX(w/2).strength(0.04)); simulation.force('y',d3.forceY(h/2).strength(0.04)); simulation.alpha(0.3).restart(); } },200); });

// ═══════════════════════════════════════════
// Refresh & Init
// ═══════════════════════════════════════════
function refreshAll() { renderStats(); renderSourceFilter(); renderTagFilters(); renderSparkList(); renderTagSuggestions(); updateCurrentView(); }

(async function init() {
  loadLocal();
  // Seed sample data for first-time users
  if (localSparks.length === 0) {
    localSparks = SAMPLE_SPARKS.map(s => ({ ...s }));
    saveLocal();
  }
  sourceFilter = 'mine'; // always mine (灵感之河)
  initGraph();
  renderTagSuggestions();
  refreshAll();
})();
</script>
